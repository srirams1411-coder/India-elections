<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Election Game</title>
<style>
  :root {
    --bg: #0f1729; --card: #1a2332; --card2: #243447;
    --text: #e8eaed; --text-dim: #8b9bb4; --accent: #f59e0b;
    --green: #10b981; --red: #ef4444; --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .screen { display: none; width: 100vw; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .screen.active { display: flex; }

  h1 { font-size: 2.8rem; font-weight: 800; text-align: center; }
  h1 .emoji { font-size: 2.4rem; }
  h2 { font-size: 1.6rem; font-weight: 700; }
  .subtitle { color: var(--text-dim); font-size: 1rem; margin-top: 4px; text-align: center; }

  .btn { padding: 14px 32px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.15s; color: #fff; }
  .btn-accent { background: var(--accent); }
  .btn-accent:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-green { background: var(--green); }
  .btn-blue { background: var(--blue); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-sm { padding: 10px 20px; font-size: 0.9rem; }

  input[type="text"] { padding: 14px 18px; border-radius: 12px; border: 2px solid var(--card2); background: var(--card); color: var(--text); font-size: 1.1rem; text-align: center; outline: none; width: 100%; }
  input:focus { border-color: var(--accent); }

  .form-card { background: var(--card); padding: 28px; border-radius: 16px; display: flex; flex-direction: column; gap: 14px; min-width: 300px; max-width: 400px; }
  .form-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .back-link { color: var(--text-dim); cursor: pointer; font-size: 0.9rem; margin-top: 10px; }

  #home { gap: 20px; }
  .home-btns { display: flex; gap: 14px; }

  #lobby { gap: 16px; }
  .room-code { font-size: 2.8rem; font-weight: 800; letter-spacing: 8px; color: var(--accent); background: var(--card); padding: 14px 36px; border-radius: 14px; }
  .party-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; max-width: 600px; width: 100%; margin-top: 12px; }
  .party-card { padding: 14px; border-radius: 12px; border: 2px solid var(--card2); background: var(--card); cursor: pointer; text-align: center; transition: all 0.15s; }
  .party-card:hover { border-color: var(--text-dim); }
  .party-card.selected { border-color: var(--accent); box-shadow: 0 0 12px rgba(245,158,11,0.3); }
  .party-card.taken { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .party-name { font-weight: 700; font-size: 1.1rem; }
  .party-tag { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }
  .party-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .lobby-players { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .lobby-player { background: var(--card2); padding: 6px 14px; border-radius: 999px; font-size: 0.85rem; }

  #game { gap: 0; padding: 0; justify-content: flex-start; }
  .game-top { width: 100%; padding: 14px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; }
  .round-label { font-weight: 700; font-size: 0.9rem; }
  .game-timer { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .game-timer.urgent { color: var(--red); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { to { transform: scale(1.1); } }

  .game-body { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 16px; overflow-y: auto; }

  .event-banner { background: linear-gradient(135deg, #7c3aed, #4f46e5); padding: 12px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; text-align: center; max-width: 500px; width: 100%; }

  .issue-card { background: var(--card); border-radius: 16px; padding: 24px; max-width: 500px; width: 100%; text-align: center; }
  .issue-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
  .issue-axis { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .issue-dna { font-size: 0.8rem; color: var(--text-dim); margin-top: 8px; }

  .position-picker { display: flex; flex-direction: column; gap: 8px; max-width: 500px; width: 100%; }
  .pos-option { padding: 14px 18px; border-radius: 12px; background: var(--card); border: 2px solid var(--card2); cursor: pointer; display: flex; align-items: flex-start; gap: 12px; transition: all 0.15s; font-size: 0.9rem; flex-direction: column; }
  .pos-option:hover { border-color: var(--text-dim); }
  .pos-option.selected { border-color: var(--accent); background: rgba(245,158,11,0.1); }
  .pos-option.locked { opacity: 0.6; cursor: not-allowed; }
  .pos-top-row { display: flex; align-items: center; gap: 12px; width: 100%; }
  .pos-num { width: 28px; height: 28px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; flex-shrink: 0; }
  .pos-option.selected .pos-num { background: var(--accent); color: #000; }
  .pos-dna-marker { font-size: 0.7rem; color: var(--accent); margin-left: auto; flex-shrink: 0; }

  /* Consequence preview */
  .pos-consequence { display: none; width: 100%; padding-top: 8px; border-top: 1px solid var(--card2); margin-top: 4px; }
  .pos-option.selected .pos-consequence { display: block; }
  .consequence-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; padding: 2px 0; }
  .consequence-row .emoji { font-size: 0.8rem; }
  .consequence-supporters { color: var(--green); }
  .consequence-opponents { color: var(--red); }
  .consequence-neutral { color: var(--text-dim); }
  .consequence-label { font-weight: 700; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .cred-warning { font-size: 0.7rem; color: var(--red); margin-top: 4px; font-style: italic; }
  .cred-safe { font-size: 0.7rem; color: var(--green); margin-top: 4px; font-style: italic; }
  .base-loyalty { font-size: 0.7rem; color: var(--blue); margin-top: 2px; font-style: italic; }

  /* How it works panel */
  .info-panel { max-width: 500px; width: 100%; background: var(--card); border-radius: 12px; padding: 14px; border-left: 3px solid var(--blue); }
  .info-panel summary { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-weight: 700; }
  .info-panel p { font-size: 0.72rem; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
  .info-panel strong { color: var(--text); }
  .info-panel .info-rule { display: flex; align-items: flex-start; gap: 6px; margin-top: 6px; font-size: 0.72rem; color: var(--text-dim); }
  .info-panel .info-rule .emoji { flex-shrink: 0; }

  .confirm-row { display: flex; gap: 12px; align-items: center; }
  .submit-count { font-size: 0.8rem; color: var(--text-dim); }

  .blocs-panel { max-width: 500px; width: 100%; background: var(--card); border-radius: 12px; padding: 14px; }
  .blocs-title { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .blocs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .bloc-item { font-size: 0.75rem; display: flex; justify-content: space-between; padding: 4px 8px; border-radius: 6px; background: var(--card2); }
  .bloc-pref { color: var(--accent); font-weight: 700; }

  /* Results */
  #results { gap: 14px; padding: 20px; overflow-y: auto; position: relative; }
  .results-positions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 500px; }
  .result-chip { padding: 8px 14px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .result-pos { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; }

  /* Bloc reactions container */
  .bloc-reactions { max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 4px; position: relative; }
  .bloc-reaction-row { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; padding: 6px 10px; border-radius: 8px; background: var(--card); opacity: 0; transform: translateX(-20px); animation: slideIn 0.4s ease forwards; position: relative; overflow: hidden; }
  .bloc-reaction-row .bloc-rx-name { flex: 1; font-weight: 600; min-width: 0; }
  .bloc-reaction-row .bloc-rx-size { color: var(--text-dim); font-size: 0.7rem; flex-shrink: 0; }
  .bloc-reaction-row .bloc-rx-emoji { font-size: 1rem; flex-shrink: 0; }
  .bloc-reaction-row.love { border-left: 3px solid var(--green); }
  .bloc-reaction-row.like { border-left: 3px solid #6ee7b7; }
  .bloc-reaction-row.neutral { border-left: 3px solid var(--text-dim); }
  .bloc-reaction-row.dislike { border-left: 3px solid #fca5a5; }
  .bloc-reaction-row.hate { border-left: 3px solid var(--red); }
  @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

  /* Floating emojis */
  .floating-emoji { position: fixed; font-size: 1.4rem; pointer-events: none; z-index: 100; animation: floatUp 1.8s ease-out forwards; }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    60% { opacity: 1; transform: translateY(-60px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-100px) scale(0.6); }
  }

  .leaderboard { max-width: 500px; width: 100%; }
  .lb-row { display: flex; align-items: center; padding: 10px 14px; border-radius: 10px; background: var(--card); margin-bottom: 6px; }
  .lb-rank { width: 28px; font-weight: 800; color: var(--accent); }
  .lb-party { flex: 1; font-weight: 600; }
  .lb-bar-container { flex: 2; height: 20px; background: var(--card2); border-radius: 10px; overflow: hidden; margin: 0 12px; position: relative; }
  .lb-bar { height: 100%; border-radius: 10px; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
  .lb-share { font-weight: 700; min-width: 50px; text-align: right; }
  .lb-delta { font-size: 0.7rem; font-weight: 700; margin-left: 4px; }
  .lb-delta.up { color: var(--green); }
  .lb-delta.down { color: var(--red); }
  .lb-delta.same { color: var(--text-dim); }

  .cred-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 500px; }
  .cred-chip { font-size: 0.75rem; padding: 4px 10px; border-radius: 8px; background: var(--card); }

  .auto-next { font-size: 0.8rem; color: var(--text-dim); margin-top: 8px; }

  #gameOver { gap: 20px; }
  .winner-crown { font-size: 3rem; }
  .winner-party { font-size: 2rem; font-weight: 800; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 9999; display: none; font-size: 0.9rem; }
  .toast.show { display: block; animation: slideDown 0.3s; }
  @keyframes slideDown { from { opacity: 0; top: 0; } to { opacity: 1; top: 20px; } }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="home" class="screen active">
  <h1><span class="emoji">🗳️</span> Election Game</h1>
  <p class="subtitle">Multiplayer Indian politics strategy</p>
  <div class="home-btns">
    <button class="btn btn-accent" onclick="showScreen('hostScreen')">Host</button>
    <button class="btn btn-blue" onclick="showScreen('joinScreen')">Join</button>
  </div>
</div>

<div id="hostScreen" class="screen">
  <div class="form-card">
    <div class="form-label">Your Name</div>
    <input type="text" id="hostName" placeholder="Enter name" maxlength="20" />
    <button class="btn btn-accent" onclick="createRoom()">Create Room</button>
  </div>
  <span class="back-link" onclick="showScreen('home')">← Back</span>
</div>

<div id="joinScreen" class="screen">
  <div class="form-card">
    <div class="form-label">Your Name</div>
    <input type="text" id="joinName" placeholder="Enter name" maxlength="20" />
    <div class="form-label">Room Code</div>
    <input type="text" id="joinCode" placeholder="ABCDE" maxlength="5" style="text-transform:uppercase;letter-spacing:6px;font-size:1.4rem;" />
    <button class="btn btn-accent" onclick="joinRoom()">Join</button>
  </div>
  <span class="back-link" onclick="showScreen('home')">← Back</span>
</div>

<div id="lobby" class="screen">
  <h2>Pick Your Party</h2>
  <div class="room-code" id="lobbyCode"></div>
  <p class="subtitle">Share this code with friends (2-6 players)</p>
  <div class="party-grid" id="partyGrid"></div>
  <div class="lobby-players" id="lobbyPlayers"></div>
  <button class="btn btn-green" id="startBtn" style="display:none;" onclick="startGame()">Start Game</button>
</div>

<div id="game" class="screen">
  <div class="game-top">
    <span class="round-label" id="roundLabel">Round 1/5</span>
    <span class="game-timer" id="gameTimer">60</span>
  </div>
  <div class="game-body" id="gameBody"></div>
</div>

<div id="results" class="screen">
  <h2 id="resultsTitle">Round Results</h2>
  <div id="resultsIssue" style="color:var(--text-dim);font-size:0.9rem;text-align:center;"></div>
  <div class="results-positions" id="resultsPositions"></div>
  <div class="bloc-reactions" id="blocReactions"></div>
  <div class="leaderboard" id="leaderboard"></div>
  <div class="cred-row" id="credRow"></div>
  <div class="auto-next" id="autoNext">Next round in 8s...</div>
</div>

<div id="gameOver" class="screen">
  <div class="winner-crown">👑</div>
  <div class="winner-party" id="winnerParty"></div>
  <p class="subtitle" id="winnerSubtitle">wins the election!</p>
  <p class="subtitle" style="font-size:0.8rem;color:var(--accent);margin-top:-8px;">First Past The Post — highest vote share wins</p>
  <div class="leaderboard" id="finalLeaderboard"></div>
  <button class="btn btn-accent" onclick="location.reload()">Play Again</button>
</div>

<script>
let ws, myPlayerId = null, myParty = null, isHost = false;
let parties = {}, timerInterval = null, selectedPosition = null, confirmed = false;
let currentRoundData = null; // store round data for consequence previews
let previousLeaderboard = {}; // store previous shares for animation deltas
let botParties = []; // party keys controlled by AI
let botInfo = []; // { partyKey, name, color } for display

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function toast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  return new Promise((resolve, reject) => {
    try { ws = new WebSocket(`${proto}//${location.host}`); } catch(e) { toast("Cannot connect"); return reject(e); }
    ws.onopen = () => resolve();
    ws.onerror = () => { toast("Connection failed"); reject(); };
    ws.onclose = () => toast("Disconnected");
    ws.onmessage = (e) => handleMsg(JSON.parse(e.data));
  });
}

function handleMsg(msg) {
  switch (msg.type) {
    case "roomCreated":
      myPlayerId = msg.playerId; isHost = true;
      document.getElementById("lobbyCode").textContent = msg.code;
      document.getElementById("startBtn").style.display = "inline-block";
      showScreen("lobby"); break;
    case "joined":
      myPlayerId = msg.playerId;
      document.getElementById("lobbyCode").textContent = msg.code;
      document.getElementById("startBtn").style.display = "none";
      showScreen("lobby"); break;
    case "error": toast(msg.msg); break;
    case "lobbyUpdate": renderLobby(msg); break;
    case "gameStart":
      parties = msg.parties;
      if (msg.bots && msg.bots.length > 0) {
        botInfo = msg.bots;
        botParties = msg.bots.map(b => b.partyKey);
        // Notify about the AI spoiler
        const botNames = msg.bots.map(b => b.name).join(', ');
        setTimeout(() => toast(`🤖 ${botNames} joins as AI spoiler!`), 500);
      }
      showScreen("game");
      break;
    case "newRound": renderRound(msg); break;
    case "positionAck":
      confirmed = true;
      document.querySelectorAll(".pos-option").forEach(el => el.classList.add("locked"));
      break;
    case "submitCount":
      const sc = document.getElementById("submitCount");
      if (sc) sc.textContent = `${msg.count}/${msg.total} locked in`;
      break;
    case "roundResults": renderResults(msg); break;
    case "gameOver": renderGameOver(msg); break;
  }
}

async function createRoom() {
  const name = document.getElementById("hostName").value.trim();
  if (!name) return toast("Enter your name");
  try { await connect(); ws.send(JSON.stringify({ type: "createRoom", name })); } catch(e) {}
}
async function joinRoom() {
  const name = document.getElementById("joinName").value.trim();
  const code = document.getElementById("joinCode").value.trim().toUpperCase();
  if (!name) return toast("Enter your name");
  if (code.length < 5) return toast("Enter room code");
  try { await connect(); ws.send(JSON.stringify({ type: "joinRoom", code, name })); } catch(e) {}
}
function startGame() { ws.send(JSON.stringify({ type: "startGame" })); }

function renderLobby(msg) {
  parties = msg.parties;
  const grid = document.getElementById("partyGrid");
  const available = new Set(msg.availableParties);
  const takenBy = {};
  msg.players.forEach(p => { if (p.party) takenBy[p.party] = p.name; });
  const me = msg.players.find(p => p.id === myPlayerId);
  myParty = me?.party || null;

  grid.innerHTML = Object.entries(msg.parties).map(([key, p]) => {
    const isMine = key === myParty;
    const taken = !available.has(key) && !isMine;
    const baseTxt = p.baseBlocs ? p.baseBlocs.join(', ') : '';
    return `<div class="party-card ${isMine ? 'selected' : ''} ${taken ? 'taken' : ''}" onclick="pickParty('${key}')">
      <div><span class="party-dot" style="background:${p.color}"></span><span class="party-name">${p.name}</span></div>
      <div class="party-tag" style="font-size:0.65rem;color:var(--text-dim);margin-top:2px;">${p.fullName || ''}</div>
      <div class="party-tag">${p.tagline}</div>
      ${baseTxt ? `<div class="party-tag" style="color:var(--accent);font-size:0.65rem;">Base: ${baseTxt}</div>` : ''}
      ${taken ? `<div class="party-tag" style="color:var(--red);">Taken by ${takenBy[key]}</div>` : ''}
    </div>`;
  }).join("");

  document.getElementById("lobbyPlayers").innerHTML = msg.players.map(p =>
    `<span class="lobby-player">${p.name}${p.party ? ' (' + msg.parties[p.party].name + ')' : ' — picking...'}</span>`
  ).join("");
  if (isHost) document.getElementById("startBtn").style.display = "inline-block";
}

function pickParty(key) { ws.send(JSON.stringify({ type: "pickParty", party: key })); }

// ── Consequence preview logic ──
// Compute how each voter bloc would react to a given position on the current axis
function computeConsequences(posVal) {
  if (!currentRoundData) return [];
  const axis = currentRoundData.issue.axis;
  const blocs = currentRoundData.voterBlocs;
  const myDna = currentRoundData.playerInfo[myParty]?.dna;
  const results = [];

  for (const bloc of blocs) {
    const blocPref = bloc.prefs[axis];
    const distance = Math.abs(posVal - blocPref);
    let reaction, emoji, cssClass;

    // Check hard floor/ceiling
    let blocked = false;
    if (bloc.hardFloor && bloc.hardFloor[axis] !== undefined && posVal < bloc.hardFloor[axis]) blocked = true;
    if (bloc.hardCeiling && bloc.hardCeiling[axis] !== undefined && posVal > bloc.hardCeiling[axis]) blocked = true;

    if (blocked) {
      reaction = "Dealbreaker"; emoji = "🚫"; cssClass = "hate";
    } else if (distance === 0) {
      reaction = "Exactly what they want"; emoji = "❤️"; cssClass = "love";
    } else if (distance === 1) {
      reaction = "Close enough — they'll lean your way"; emoji = "💚"; cssClass = "like";
    } else if (distance === 2) {
      reaction = "Lukewarm — split support"; emoji = "😐"; cssClass = "neutral";
    } else if (distance === 3) {
      reaction = "Too far — they'll look elsewhere"; emoji = "⚠️"; cssClass = "dislike";
    } else {
      reaction = "Opposite of what they want"; emoji = "❌"; cssClass = "hate";
    }

    results.push({ name: bloc.name, size: bloc.size, pref: blocPref, reaction, emoji, cssClass });
  }
  return results;
}

function buildConsequenceHTML(posVal) {
  const consequences = computeConsequences(posVal);
  const myDna = currentRoundData?.playerInfo[myParty]?.dna;
  const drift = myDna !== undefined ? Math.abs(posVal - myDna) : 0;

  // Sort: best reactions first
  const order = { love: 0, like: 1, neutral: 2, dislike: 3, hate: 4 };
  consequences.sort((a, b) => order[a.cssClass] - order[b.cssClass]);

  // Group by reaction type
  const supporters = consequences.filter(c => c.cssClass === 'love' || c.cssClass === 'like');
  const opponents = consequences.filter(c => c.cssClass === 'dislike' || c.cssClass === 'hate');
  const neutrals = consequences.filter(c => c.cssClass === 'neutral');

  let html = '<div class="pos-consequence">';

  // Check which of the consequences are base blocs
  const myPartyData = parties[myParty] || {};
  const myBases = new Set(myPartyData.baseBlocs || []);
  const baseInSupport = supporters.filter(c => myBases.has(c.name));
  const baseInOpponents = opponents.filter(c => myBases.has(c.name));

  if (supporters.length > 0) {
    const supportPct = supporters.reduce((sum, c) => sum + c.size, 0);
    html += `<div class="consequence-row consequence-supporters">
      <span class="emoji">💚</span> <strong>${supportPct}% electorate</strong> leans your way — ${supporters.map(c => myBases.has(c.name) ? `<strong>${c.name} ★</strong>` : c.name).join(', ')}
    </div>`;
  }
  if (opponents.length > 0) {
    const oppPct = opponents.reduce((sum, c) => sum + c.size, 0);
    html += `<div class="consequence-row consequence-opponents">
      <span class="emoji">⚠️</span> <strong>${oppPct}% electorate</strong> turns away — ${opponents.map(c => myBases.has(c.name) ? `<strong>${c.name} ★</strong>` : c.name).join(', ')}
    </div>`;
  }
  if (neutrals.length > 0) {
    const neutPct = neutrals.reduce((sum, c) => sum + c.size, 0);
    html += `<div class="consequence-row consequence-neutral">
      <span class="emoji">😐</span> <strong>${neutPct}%</strong> on the fence — ${neutrals.map(c => myBases.has(c.name) ? `<strong>${c.name} ★</strong>` : c.name).join(', ')}
    </div>`;
  }

  // Base loyalty note
  if (baseInSupport.length > 0) {
    html += `<div class="base-loyalty">★ ${baseInSupport.map(c => c.name).join(', ')} = your base (25% loyalty bonus)</div>`;
  }
  if (baseInOpponents.length > 0) {
    html += `<div class="cred-warning">★ Warning: ${baseInOpponents.map(c => c.name).join(', ')} is your base but this stance pushes them away</div>`;
  }

  // Credibility warning
  if (drift > 1) {
    const penalty = Math.pow(drift - 1, 1.5).toFixed(1);
    html += `<div class="cred-warning">⚡ ${drift} steps from DNA — you'll lose ${penalty} credibility</div>`;
  } else {
    html += `<div class="cred-safe">✓ Within DNA range — credibility stays safe</div>`;
  }

  html += '</div>';
  return html;
}

function renderRound(msg) {
  showScreen("game");
  selectedPosition = null;
  confirmed = false;
  currentRoundData = msg; // store for consequence preview

  document.getElementById("roundLabel").textContent = `Round ${msg.round}/${msg.total}`;

  const body = document.getElementById("gameBody");
  let html = "";

  if (msg.event) {
    html += `<div class="event-banner">⚡ ${msg.event.text}</div>`;
  }

  const myInfo = msg.playerInfo[myParty] || {};
  const myPartyData = parties[myParty] || {};
  const baseText = myPartyData.baseBlocs ? myPartyData.baseBlocs.join(', ') : '';
  html += `<div class="issue-card">
    <div class="issue-axis">${msg.issue.axis}</div>
    <div class="issue-title">${msg.issue.title}</div>
    <div class="issue-dna">Your DNA position: ${myInfo.dna || '?'} | Credibility: ${myInfo.credibility || 10}</div>
    ${baseText ? `<div class="issue-dna" style="color:var(--accent);">Your base: ${baseText}</div>` : ''}
  </div>`;

  // Position picker with consequence previews
  html += `<div class="position-picker">`;
  msg.issue.positions.forEach((text, i) => {
    const posVal = i + 1;
    const isDna = posVal === myInfo.dna;
    html += `<div class="pos-option" data-pos="${posVal}" onclick="selectPosition(${posVal})">
      <div class="pos-top-row">
        <span class="pos-num">${posVal}</span>
        <span>${text}</span>
        ${isDna ? '<span class="pos-dna-marker">★ DNA</span>' : ''}
      </div>
      ${buildConsequenceHTML(posVal)}
    </div>`;
  });
  html += `</div>`;

  html += `<div class="confirm-row">
    <button class="btn btn-green btn-sm" id="confirmBtn" disabled onclick="confirmPosition()">Lock In</button>
    <span class="submit-count" id="submitCount"></span>
  </div>`;

  html += `<div class="blocs-panel">
    <div class="blocs-title">Voter Blocs — preference on "${msg.issue.axis}" axis</div>
    <div class="blocs-grid">`;
  msg.voterBlocs.forEach(b => {
    const isMyBase = myPartyData.baseBlocs && myPartyData.baseBlocs.includes(b.name);
    html += `<div class="bloc-item" ${isMyBase ? 'style="border-left:2px solid var(--accent);"' : ''}>
      <span>${isMyBase ? '★ ' : ''}${b.name} (${b.size}%)</span>
      <span class="bloc-pref">wants: ${b.prefs[msg.issue.axis]}</span>
    </div>`;
  });
  html += `</div></div>`;

  // How base works info panel
  html += `<details class="info-panel">
    <summary>How does your base work?</summary>
    <div class="info-rule"><span class="emoji">★</span><span>Your base blocs (marked with ★) give you a <strong>25% loyalty bonus</strong> — even if another party picks the same position, your base voters lean toward you.</span></div>
    <div class="info-rule"><span class="emoji">🎯</span><span><strong>Playing your DNA position</strong> aligns you with your base's natural preferences AND keeps credibility safe. It's your "home turf" advantage.</span></div>
    <div class="info-rule"><span class="emoji">⚠️</span><span><strong>Loyalty isn't unconditional.</strong> If you take a stance far from what your base wants, the alignment penalty can overwhelm the loyalty bonus. You can lose your own base.</span></div>
    <div class="info-rule"><span class="emoji">🏆</span><span><strong>First Past The Post:</strong> You don't need 50%. Just get more votes than everyone else. The AI spoiler and other parties will split the vote — use that to your advantage.</span></div>
  </details>`;

  body.innerHTML = html;

  // Timer
  let t = msg.timeLimit;
  const timerEl = document.getElementById("gameTimer");
  timerEl.textContent = t; timerEl.classList.remove("urgent");
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    t--;
    timerEl.textContent = t;
    if (t <= 5) timerEl.classList.add("urgent");
    if (t <= 0) clearInterval(timerInterval);
  }, 1000);
}

function selectPosition(pos) {
  if (confirmed) return;
  selectedPosition = pos;
  document.querySelectorAll(".pos-option").forEach(el => {
    el.classList.toggle("selected", parseInt(el.dataset.pos) === pos);
  });
  document.getElementById("confirmBtn").disabled = false;
}

function confirmPosition() {
  if (confirmed || selectedPosition == null) return;
  ws.send(JSON.stringify({ type: "submitPosition", position: selectedPosition }));
}

// ── Floating emoji spawner ──
function spawnFloatingEmoji(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'floating-emoji';
  el.textContent = emoji;
  el.style.left = (x + Math.random() * 40 - 20) + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function renderResults(msg) {
  showScreen("results");
  clearInterval(timerInterval);

  document.getElementById("resultsTitle").textContent = `Round ${msg.round}/${msg.total}`;
  document.getElementById("resultsIssue").textContent = msg.issue.title;

  // Position chips (mark bots)
  const posEl = document.getElementById("resultsPositions");
  posEl.innerHTML = Object.entries(msg.positions).map(([pk, pos]) => {
    const p = parties[pk];
    const isBot = botParties.includes(pk);
    return `<div class="result-chip" style="background:${p.color}22;border:1px solid ${p.color}">
      <span style="color:${p.color}">${p.name}${isBot ? ' 🤖' : ''}</span>
      <span class="result-pos">${pos}</span>
    </div>`;
  }).join("");

  // ── Bloc reactions with hearts/warnings ──
  const reactionsEl = document.getElementById("blocReactions");
  const myPosition = msg.positions[myParty];
  const axis = msg.issue.axis;

  if (myPosition !== undefined && msg.blocResults) {
    let reactionsHTML = '<div style="font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:700;">How voters reacted to your stance</div>';

    // Sort blocs: best reaction (highest share for your party) first
    const sortedBlocs = [...msg.blocResults].sort((a, b) => {
      const aShare = a.distribution[myParty] || 0;
      const bShare = b.distribution[myParty] || 0;
      return bShare - aShare;
    });

    sortedBlocs.forEach((bloc, i) => {
      const myShare = bloc.distribution[myParty] || 0;
      let emoji, cssClass, reaction;

      if (myShare >= 50) {
        emoji = "❤️"; cssClass = "love"; reaction = `${myShare}% of their vote — strong support`;
      } else if (myShare >= 30) {
        emoji = "💚"; cssClass = "like"; reaction = `${myShare}% of their vote — leaning your way`;
      } else if (myShare >= 15) {
        emoji = "😐"; cssClass = "neutral"; reaction = `${myShare}% of their vote — on the fence`;
      } else if (myShare >= 5) {
        emoji = "⚠️"; cssClass = "dislike"; reaction = `${myShare}% of their vote — not convinced`;
      } else {
        emoji = "❌"; cssClass = "hate"; reaction = `${myShare}% of their vote — rejected your stance`;
      }

      reactionsHTML += `<div class="bloc-reaction-row ${cssClass}" style="animation-delay:${i * 0.08}s" data-emoji="${emoji}">
        <span class="bloc-rx-emoji">${emoji}</span>
        <span class="bloc-rx-name">${bloc.name}</span>
        <span class="bloc-rx-size">${bloc.size}% electorate</span>
        <span style="font-size:0.7rem;color:var(--text-dim);margin-left:8px;">${reaction}</span>
      </div>`;
    });

    reactionsEl.innerHTML = reactionsHTML;

    // Spawn floating emojis from the reaction rows after they animate in
    setTimeout(() => {
      document.querySelectorAll('.bloc-reaction-row').forEach((row, i) => {
        setTimeout(() => {
          const rect = row.getBoundingClientRect();
          const emoji = row.dataset.emoji;
          const cssClass = row.classList[1];
          if (cssClass === 'love' || cssClass === 'like') {
            for (let j = 0; j < 3; j++) {
              setTimeout(() => spawnFloatingEmoji(emoji, rect.right - 20, rect.top), j * 150);
            }
          } else if (cssClass === 'hate' || cssClass === 'dislike') {
            spawnFloatingEmoji(emoji, rect.right - 20, rect.top);
          }
        }, i * 80 + 200);
      });
    }, 300);
  } else {
    reactionsEl.innerHTML = '';
  }

  // ── Animated leaderboard with deltas ──
  renderAnimatedLeaderboard("leaderboard", msg.leaderboard);

  // Update previous leaderboard for next round
  msg.leaderboard.forEach(l => { previousLeaderboard[l.party] = l.share; });

  // Credibility chips
  const credEl = document.getElementById("credRow");
  credEl.innerHTML = Object.entries(msg.credibility).map(([pk, cred]) => {
    const p = parties[pk];
    const color = cred >= 7 ? "var(--green)" : cred >= 4 ? "var(--accent)" : "var(--red)";
    return `<span class="cred-chip" style="border-left:3px solid ${color}">${p.name}: ${cred}</span>`;
  }).join("");

  document.getElementById("autoNext").textContent = msg.round < msg.total ? "Next round in 8s..." : "";
}

function renderAnimatedLeaderboard(containerId, leaderboard) {
  const maxShare = Math.max(...leaderboard.map(l => l.share), 1);
  const el = document.getElementById(containerId);

  el.innerHTML = leaderboard.map((l, i) => {
    const prevShare = previousLeaderboard[l.party] ?? 0;
    const delta = l.share - prevShare;
    const deltaStr = delta > 0 ? `+${delta.toFixed(1)}` : delta < 0 ? delta.toFixed(1) : '—';
    const deltaClass = delta > 0.05 ? 'up' : delta < -0.05 ? 'down' : 'same';
    // Start bar at previous width, will animate to current
    const prevWidth = prevShare > 0 ? (prevShare / maxShare) * 100 : 0;

    const isBot = l.isBot || botParties.includes(l.party);
    return `<div class="lb-row">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-party" style="color:${l.color}">${l.name}${isBot ? ' 🤖' : ''}</span>
      <div class="lb-bar-container">
        <div class="lb-bar" data-target="${(l.share / maxShare) * 100}" style="width:${prevWidth}%;background:${l.color}"></div>
      </div>
      <span class="lb-share" data-from="${prevShare}" data-to="${l.share}">${prevShare.toFixed(1)}%</span>
      <span class="lb-delta ${deltaClass}">${deltaStr}</span>
    </div>`;
  }).join("");

  // Trigger bar animation after a frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.querySelectorAll('.lb-bar').forEach(bar => {
        bar.style.width = bar.dataset.target + '%';
      });
      // Animate the share number counting up/down
      el.querySelectorAll('.lb-share').forEach(span => {
        const from = parseFloat(span.dataset.from);
        const to = parseFloat(span.dataset.to);
        animateNumber(span, from, to, 1000);
      });
    });
  });
}

function animateNumber(el, from, to, duration) {
  const start = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    const current = from + (to - from) * eased;
    el.textContent = current.toFixed(1) + '%';
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function renderLeaderboard(containerId, leaderboard) {
  const maxShare = Math.max(...leaderboard.map(l => l.share), 1);
  const el = document.getElementById(containerId);
  el.innerHTML = leaderboard.map((l, i) => {
    const isBot = l.isBot || botParties.includes(l.party);
    return `<div class="lb-row">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-party" style="color:${l.color}">${l.name}${isBot ? ' 🤖' : ''}</span>
      <div class="lb-bar-container">
        <div class="lb-bar" style="width:${(l.share / maxShare) * 100}%;background:${l.color}"></div>
      </div>
      <span class="lb-share">${l.share}%</span>
    </div>`;
  }).join("");
}

function renderGameOver(msg) {
  showScreen("gameOver");
  clearInterval(timerInterval);
  const winner = msg.leaderboard[0];
  const isBot = winner.isBot || botParties.includes(winner.party);
  document.getElementById("winnerParty").textContent = winner.name + (isBot ? ' 🤖' : '');
  document.getElementById("winnerParty").style.color = winner.color;
  document.getElementById("winnerSubtitle").textContent = isBot
    ? 'The AI spoiler wins! No human party could get the most votes.'
    : `wins with ${winner.share}% — First Past The Post!`;
  renderLeaderboard("finalLeaderboard", msg.leaderboard);
}
</script>
